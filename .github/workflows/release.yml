name: Release AK

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BUILD_TYPE: Release
  ARTIFACT_NAME: ak
  DISTRIBUTIONS: "noble jammy focal plucky resolute"
  PPA_TARGET: "ppa:apertacodex/ak"

jobs:
  detect_version_bump:
    name: Detect Version Bump Type
    runs-on: ubuntu-22.04
    outputs:
      bump_type: ${{ steps.detect_bump.outputs.bump_type }}
      current_version: ${{ steps.get_version.outputs.current }}
      new_version: ${{ steps.calc_version.outputs.new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: get_version
        run: |
          CURRENT=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Detect bump type from commit messages
        id: detect_bump_push
        if: github.event_name == 'push'
        run: |
          # Check last commit message for version bump indicators
          LAST_COMMIT=$(git log -1 --pretty=%B)
          BUMP_TYPE="skip"  # default to skip unless explicitly requested
          
          # Only bump if commit message explicitly requests it
          if echo "$LAST_COMMIT" | grep -qiE "\[major\]|major version|breaking"; then
            BUMP_TYPE="major"
          elif echo "$LAST_COMMIT" | grep -qiE "\[minor\]|minor version|feature"; then
            BUMP_TYPE="minor"
          elif echo "$LAST_COMMIT" | grep -qiE "\[patch\]|patch version|bump version|release"; then
            BUMP_TYPE="patch"
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Detected bump type: $BUMP_TYPE"

      - name: Use manual bump type
        id: detect_bump_manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Using manual bump type: $BUMP_TYPE"

      - name: Set bump type output
        id: detect_bump
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "bump_type=${{ steps.detect_bump_push.outputs.bump_type }}" >> $GITHUB_OUTPUT
          else
            echo "bump_type=${{ steps.detect_bump_manual.outputs.bump_type }}" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        id: calc_version
        run: |
          CURRENT="${{ steps.get_version.outputs.current }}"
          BUMP_TYPE="${{ steps.detect_bump.outputs.bump_type }}"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "$BUMP_TYPE" in
            major)
              NEW_MAJOR=$((MAJOR + 1))
              NEW_VERSION="${NEW_MAJOR}.0.0"
              ;;
            minor)
              NEW_MINOR=$((MINOR + 1))
              NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
              ;;
            patch)
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
              ;;
            skip)
              NEW_VERSION="$CURRENT"
              ;;
          esac
          
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

  bump_version:
    name: Bump Version
    runs-on: ubuntu-22.04
    needs: detect_version_bump
    if: github.event_name == 'push' && needs.detect_version_bump.outputs.bump_type != 'skip'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qt6-base-dev qt6-base-dev-tools

      - name: Bump version
        run: |
          BUMP_TYPE="${{ needs.detect_version_bump.outputs.bump_type }}"
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --target "bump-$BUMP_TYPE"

      - name: Get new version
        id: new_version
        run: |
          NEW_VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "?? Bump version to ${{ steps.new_version.outputs.version }}"
          git push origin main

  build_linux:
    name: Build Linux (${{ matrix.distribution }})
    runs-on: ubuntu-22.04
    needs: [detect_version_bump, bump_version]
    if: always() && (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        distribution: [noble, jammy, focal, plucky]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev zlib1g-dev \
            dpkg-dev fakeroot devscripts debhelper \
            qt6-base-dev qt6-base-dev-tools

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE}

      - name: Build
        run: cmake --build build --config ${BUILD_TYPE} -j$(nproc)

      - name: Build Debian package
        run: |
          VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          
          # Build the binary first
          cmake --build build --config ${BUILD_TYPE} -j$(nproc)
          
          # Create dist directory
          mkdir -p dist
          
          # Build .deb package using Makefile
          VERSION=$VERSION make package-deb || {
            echo "Make package-deb failed, trying alternative method..."
            # Fallback: create .deb manually
            mkdir -p pkg/deb/ak_${VERSION}_amd64/DEBIAN
            mkdir -p pkg/deb/ak_${VERSION}_amd64/usr/bin
            cp build/ak pkg/deb/ak_${VERSION}_amd64/usr/bin/ak
            chmod 0755 pkg/deb/ak_${VERSION}_amd64/usr/bin/ak
            
            cat > pkg/deb/ak_${VERSION}_amd64/DEBIAN/control <<EOF
          Package: ak
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ApertaCodex <developers@apertacodex.ai>
          Depends: gpg, coreutils, bash, curl
          Description: ak ? secure API key manager (CLI, C++)
          EOF
            
            dpkg-deb --build pkg/deb/ak_${VERSION}_amd64 dist/ak_${VERSION}_amd64.deb
          }
          
          # Create tarball
          if [ ! -e dist/*.tar.gz ]; then
            tar czf dist/${{ env.ARTIFACT_NAME }}-linux-${{ matrix.distribution }}-x86_64.tar.gz -C build ${{ env.ARTIFACT_NAME }} || true
          fi
          
          ls -lah dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.distribution }}
          path: dist/*
          retention-days: 30

  build_windows:
    name: Build Windows
    runs-on: windows-2022
    needs: [detect_version_bump, bump_version]
    if: always() && (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add MSVC & CMake
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build tools
        shell: bash
        run: |
          choco install ninja -y

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtbase'
          arch: 'win64_msvc2019_64'
        id: qt

      - name: Configure (CMake + Ninja)
        shell: bash
        env:
          CMAKE_PREFIX_PATH: ${{ steps.qt.outputs.QT_PREFIX }}
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${BUILD_TYPE}

      - name: Build
        shell: bash
        run: cmake --build build --config ${BUILD_TYPE} -j 4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Package (CPack NSIS)
        shell: bash
        run: cmake --build build --target package

      - name: Stage & Zip
        shell: bash
        run: |
          mkdir -p dist
          if [ -f "build/${{ env.ARTIFACT_NAME }}.exe" ]; then
            cp "build/${{ env.ARTIFACT_NAME }}.exe" dist/
          else
            find build -maxdepth 2 -name "*.exe" -exec cp {} dist/ \;
          fi
          7z a -tzip "dist/${{ env.ARTIFACT_NAME }}-windows-x86_64.zip" ./dist/*.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*
          retention-days: 30

  build_macos:
    name: Build macOS
    runs-on: macos-13
    needs: [detect_version_bump, bump_version]
    if: always() && (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          brew update
          brew install cmake ninja
          brew install qt@6
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --config ${BUILD_TYPE} -j 3

      - name: Package with CPack
        run: |
          cmake --build build --target package || true
          mkdir -p dist
          cp build/*.dmg dist/ 2>/dev/null || true
          cp build/*.tar.gz dist/ 2>/dev/null || true
          if [ ! -e dist/*.tar.gz ]; then
            tar czf dist/${{ env.ARTIFACT_NAME }}-macos-universal.tar.gz -C build ${{ env.ARTIFACT_NAME }} || true
          fi
          ls -lah dist

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*
          retention-days: 30

  publish_ppa:
    name: Publish to Launchpad PPA (${{ matrix.distribution }})
    runs-on: ubuntu-22.04
    needs: [detect_version_bump, bump_version]
    if: always() && (needs.bump_version.result == 'success' || needs.bump_version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        distribution: [noble, jammy, focal, plucky, resolute]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PPA signing secrets
        id: guard
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          DEBSIGN_KEYID: ${{ secrets.DEBSIGN_KEYID }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$DEBSIGN_KEYID" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping PPA publish for ${{ matrix.distribution }}: GPG_PRIVATE_KEY and/or DEBSIGN_KEYID secret not set."
          fi

      - name: Install packaging tools
        if: steps.guard.outputs.ok == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts debhelper dput gnupg lintian

      - name: Import GPG signing key
        if: steps.guard.outputs.ok == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.AK_REPO_GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          # Key may be stored base64-encoded or as a raw ASCII-armored block.
          if echo "$GPG_PRIVATE_KEY" | base64 -d > /tmp/ak_ppa_key.asc 2>/dev/null; then
            :
          else
            printf '%s' "$GPG_PRIVATE_KEY" > /tmp/ak_ppa_key.asc
          fi
          gpg --batch --import /tmp/ak_ppa_key.asc
          rm -f /tmp/ak_ppa_key.asc
          # Persist passphrase to a file for non-interactive debsign.
          printf '%s' "$GPG_PASSPHRASE" > /tmp/ak_ppa_pass
          chmod 600 /tmp/ak_ppa_pass

      - name: Build signed source package
        if: steps.guard.outputs.ok == 'true'
        env:
          DEBSIGN_KEYID: ${{ secrets.DEBSIGN_KEYID }}
          DEBEMAIL: developers@apertacodex.ai
          DEBFULLNAME: ApertaCodex
        run: |
          SERIES="${{ matrix.distribution }}"
          VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          UPLOAD_VERSION="${VERSION}~${SERIES}1"
          echo "Building source package ${UPLOAD_VERSION} for ${SERIES}"

          # Drop committed build artifacts so they don't leak into the source upload.
          rm -f ak ak_tests
          rm -rf build obj pkg dist

          # Single, clean changelog entry targeting this series. The ~series
          # suffix keeps each series' version unique and ordered below the
          # plain upstream version, as Launchpad requires for re-uploads.
          cat > debian/changelog <<EOF
          ak (${UPLOAD_VERSION}) ${SERIES}; urgency=medium

            * Automated PPA build for ${SERIES} (AK ${VERSION}).

           -- ${DEBFULLNAME} <${DEBEMAIL}>  $(date -R)
          EOF

          # gpg wrapper so debsign can sign non-interactively.
          cat > /tmp/gpg-loopback <<'WRAP'
          #!/bin/bash
          exec gpg --batch --pinentry-mode loopback --passphrase-file /tmp/ak_ppa_pass "$@"
          WRAP
          chmod +x /tmp/gpg-loopback

          # Source-only build (-S), skip build-dep check (-d) since Qt6 is not
          # installed on the runner; Launchpad does the actual binary build.
          dpkg-buildpackage -S -us -uc -d
          CHANGES="../ak_${UPLOAD_VERSION}_source.changes"
          debsign -p/tmp/gpg-loopback -k"${DEBSIGN_KEYID}" "${CHANGES}"
          ls -lah ../ak_${UPLOAD_VERSION}* 

      - name: Upload to Launchpad PPA
        if: steps.guard.outputs.ok == 'true'
        run: |
          SERIES="${{ matrix.distribution }}"
          VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          UPLOAD_VERSION="${VERSION}~${SERIES}1"
          CHANGES="../ak_${UPLOAD_VERSION}_source.changes"
          # -f forces re-upload attempt; Launchpad still rejects duplicate
          # versions, which is harmless and reported in the build log.
          dput -f "${{ env.PPA_TARGET }}" "${CHANGES}"

      - name: Clean up secrets
        if: always()
        run: rm -f /tmp/ak_ppa_pass /tmp/gpg-loopback

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build_linux, build_windows, build_macos]
    if: always() && (needs.build_linux.result == 'success' || needs.build_linux.result == 'failure')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: collected

      - name: Add install script to release
        run: |
          cp install-ak.sh collected/install-ak.sh || echo "install-ak.sh not found, skipping"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Quick Install (Linux/macOS):**
            ```bash
            curl -fsSL https://github.com/ApertaCodex/ak/releases/download/v${{ steps.version.outputs.version }}/install-ak.sh | bash
            ```
            
            **macOS (Homebrew):**
            ```bash
            brew tap apertacodex/ak https://github.com/apertacodex/ak.git
            brew install ak
            ```
            
            **Windows:**
            Download the installer from the assets below.
            
            **Linux:**
            Download the .deb package from the assets below and install with:
            ```bash
            sudo dpkg -i ak_*.deb
            ```
          files: |
            collected/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: [create_release]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'set\(AK_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          mkdir -p dl
          gh release download "$TAG" --pattern "*macos*.tar.gz" --dir dl || echo "No macOS artifact found"

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE=$(ls dl/*.tar.gz 2>/dev/null | head -1)
          
          if [ -z "$FILE" ]; then
            echo "No macOS artifact found, skipping formula update"
            exit 0
          fi
          
          SHA=$(shasum -a 256 "$FILE" | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/$(basename "$FILE")"
          
          # Update Formula/ak.rb
          sed -i.bak \
            -e "s|^  url .*|  url \"$URL\"|" \
            -e "s|^  sha256 .*|  sha256 \"$SHA\"|" \
            -e "s|^  version .*|  version \"$VERSION\"|" \
            Formula/ak.rb
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ak.rb
          git commit -m "chore(brew): bump to v$VERSION" || echo "No changes"
          git push origin main
